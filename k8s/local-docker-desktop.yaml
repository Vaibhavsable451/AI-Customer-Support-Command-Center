apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-support-local-config
  namespace: ai-support
data:
  APP_NAME: "AI Customer Support Agent Platform"
  APP_ENV: "local"
  APP_VERSION: "1.0.0"
  DEBUG: "true"
  ACCESS_TOKEN_EXPIRE_MINUTES: "60"
  DATABASE_URL: "mysql+pymysql://support_user:support_pass@mysql-svc:3306/support_db"
  GROQ_MODEL: "llama-3.3-70b-versatile"
  GROQ_FALLBACK_MODEL: "llama-3.1-8b-instant"
  PINECONE_ENVIRONMENT: "us-east-1"
  PINECONE_INDEX_NAME: "support-kb-index"
  EMBEDDING_DIMENSION: "384"
  EMBEDDING_MODEL: "sentence-transformers/all-MiniLM-L6-v2"
  TRANSFORMERS_CACHE: "/app/.cache"
  MLFLOW_TRACKING_URI: "http://mlflow-svc:5000"
  MLFLOW_EXPERIMENT_NAME: "ai-support-agent"
  MAX_RETRIEVAL_DOCS: "5"
  SIMILARITY_THRESHOLD: "0.65"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: ai-support
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_USER
              value: support_user
            - name: MYSQL_PASSWORD
              value: support_pass
            - name: MYSQL_DATABASE
              value: support_db
            - name: MYSQL_ROOT_PASSWORD
              value: root_pass
---
apiVersion: v1
kind: Service
metadata:
  name: mysql-svc
  namespace: ai-support
spec:
  selector:
    app: mysql
  ports:
    - name: mysql
      port: 3306
      targetPort: 3306
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-support-api
  namespace: ai-support
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-support-api
  template:
    metadata:
      labels:
        app: ai-support-api
    spec:
      containers:
        - name: api
          image: ai-support-platform-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: ai-support-local-config
          env:
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-support-secrets
                  key: SECRET_KEY
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-support-secrets
                  key: GROQ_API_KEY
            - name: PINECONE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-support-secrets
                  key: PINECONE_API_KEY
---
apiVersion: v1
kind: Service
metadata:
  name: ai-support-api-svc
  namespace: ai-support
spec:
  type: NodePort
  selector:
    app: ai-support-api
  ports:
    - name: http
      port: 80
      targetPort: 8000
      nodePort: 30080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-support-frontend
  namespace: ai-support
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-support-frontend
  template:
    metadata:
      labels:
        app: ai-support-frontend
    spec:
      containers:
        - name: frontend
          image: ai-support-platform-api:latest
          imagePullPolicy: IfNotPresent
          command:
            - python
            - -m
            - streamlit
            - run
            - frontend/streamlit_app.py
            - --server.address
            - 0.0.0.0
            - --server.port
            - "8501"
            - --server.headless
            - "true"
          ports:
            - containerPort: 8501
          env:
            - name: API_BASE_URL
              value: http://ai-support-api-svc
---
apiVersion: v1
kind: Service
metadata:
  name: ai-support-frontend-svc
  namespace: ai-support
spec:
  type: NodePort
  selector:
    app: ai-support-frontend
  ports:
    - name: http
      port: 80
      targetPort: 8501
      nodePort: 30501
